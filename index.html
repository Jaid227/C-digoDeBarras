<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Registro de Ventas · Asociación</title>
    <!-- CSS se carga desde archivo externo (link) -->
    <link rel="stylesheet" href="styles.css" />
    <!-- Librería JsBarcode para generar Code128 -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <!-- Contenedor principal -->
    <div class="app-container" id="appContainer">

        <!-- Encabezado con modo claro/oscuro -->
        <header class="app-header">
            <h1>📱 Registro de Ventas</h1>
            <button id="themeToggle" class="theme-btn" aria-label="Cambiar tema">🌙</button>
        </header>

        <!-- Panel de escaneo / agregar producto -->
        <section class="scanner-panel">
            <div class="input-group">
                <input type="text" id="productCodeInput" placeholder="Código de barras (Code128)" />
                <button id="scanBtn" class="scan-btn">📷 Escanear</button>
            </div>
            <div class="product-preview" id="productPreview">
                <span>📦 Producto: <strong id="previewName">—</strong></span>
                <span>🔢 <span id="previewCode">—</span></span>
            </div>
            <button id="addProductBtn" class="add-btn">➕ Agregar a la venta</button>
        </section>

        <!-- Lista de ventas del día -->
        <section class="sales-list">
            <div class="list-header">
                <h2>Ventas del día</h2>
                <button id="clearSalesBtn" class="clear-btn">🗑️ Borrar todo</button>
            </div>
            <ul id="salesList" class="sales-ul">
                <!-- Los productos se renderizan dinámicamente -->
                <li class="empty-message">No hay productos registrados hoy.</li>
            </ul>
        </section>

        <!-- Footer con enlace -->
        <footer class="app-footer">
            <a href="https://jaid227.github.io/EntropiaDigital/" target="_blank" rel="noopener noreferrer">
                © 2026 Mandrágora Entrópica | Desarrollo Web Estratégico
            </a>
        </footer>
    </div>

    <!-- Diálogo de confirmación personalizado para borrar con clave -->
    <div id="clearModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3>🔒 Confirmar borrado</h3>
            <p>Ingresa la clave para eliminar todas las ventas del día:</p>
            <input type="password" id="clearPasswordInput" placeholder="Clave" />
            <div class="modal-actions">
                <button id="modalConfirmBtn" class="modal-btn confirm">Borrar</button>
                <button id="modalCancelBtn" class="modal-btn cancel">Cancelar</button>
            </div>
            <span id="modalError" class="modal-error hidden">Clave incorrecta</span>
        </div>
    </div>

    <!-- Script se carga desde archivo externo -->
    <script src="script.js"></script>
</body>
</html>
